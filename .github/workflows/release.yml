name: Release

on:
  push:
    tags:
      - 'v*'

# Manual trigger for re-running a release if the artifact upload fails.
# (Re-running creates a new draft; doesn't replace the published one.)
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Qt6 dev packages
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          # libxkbcommon-dev + libwayland-dev are needed by
          # wdotool-core's libei + wlroots backends.
          packages: qt6-base-dev qt6-declarative-dev pkg-config libgl-dev libxkbcommon-dev libwayland-dev
          version: v2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage tarball
        id: stage
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          TRIPLE="x86_64-unknown-linux-gnu"
          NAME="wflow-${VERSION}-${TRIPLE}"
          STAGE="${GITHUB_WORKSPACE}/stage"
          mkdir -p "${STAGE}/${NAME}/completions" "${STAGE}/${NAME}/man"

          BIN="${STAGE}/${NAME}/wflow"
          install -m755 target/release/wflow "${BIN}"

          install -m644 README.md       "${STAGE}/${NAME}/README.md"
          install -m644 LICENSE-MIT     "${STAGE}/${NAME}/LICENSE-MIT"
          install -m644 LICENSE-APACHE  "${STAGE}/${NAME}/LICENSE-APACHE"
          install -m644 REVIEW.md       "${STAGE}/${NAME}/REVIEW.md"
          install -m644 docs/KDL.md     "${STAGE}/${NAME}/KDL.md"

          # Generate completions + man pages from the binary itself, so
          # they're always in sync with what shipped.
          "${BIN}" completions bash > "${STAGE}/${NAME}/completions/wflow.bash"
          "${BIN}" completions zsh  > "${STAGE}/${NAME}/completions/_wflow"
          "${BIN}" completions fish > "${STAGE}/${NAME}/completions/wflow.fish"
          "${BIN}" man --output "${STAGE}/${NAME}/man" >/dev/null

          cat > "${STAGE}/${NAME}/INSTALL.txt" <<'EOF'
          wflow x86_64 Linux binary distribution.

          Requirements
          ------------
          - Qt 6 runtime libraries:  qt6-base, qt6-declarative
            (or your distro equivalent: qt6-base-dev, qt6-declarative-dev
             on Debian/Ubuntu)
          - Optional: wdotool on PATH for input automation, libnotify for
            notify-send, wl-clipboard for wl-copy, xdg-desktop-portal for
            Record Mode.

          Quick install
          -------------
          sudo install -m755 wflow /usr/local/bin/wflow

          Completions
          -----------
          sudo install -m644 completions/wflow.bash \
              /usr/share/bash-completion/completions/wflow
          sudo install -m644 completions/_wflow \
              /usr/share/zsh/site-functions/_wflow
          sudo install -m644 completions/wflow.fish \
              /usr/share/fish/vendor_completions.d/wflow.fish

          Man pages
          ---------
          sudo install -d /usr/local/share/man/man1
          sudo install -m644 man/*.1 /usr/local/share/man/man1/
          sudo mandb 2>/dev/null || true

          Verify
          ------
          wflow --version
          wflow doctor
          EOF

          (cd "${STAGE}" && tar -czf "${NAME}.tar.gz" "${NAME}")
          (cd "${STAGE}" && sha256sum "${NAME}.tar.gz" > "SHA256SUMS")

          echo "version=${VERSION}"   >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}"         >> "${GITHUB_OUTPUT}"
          echo "stage=${STAGE}"       >> "${GITHUB_OUTPUT}"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Publish via a PAT (RELEASE_PAT) instead of GITHUB_TOKEN
          # so the release.published event can trigger downstream
          # workflows (aur-publish.yml). GitHub deliberately blocks
          # GITHUB_TOKEN-driven events from dispatching other
          # workflows to prevent recursion; a PAT bypasses that.
          # Falls back to GITHUB_TOKEN if the secret isn't set so
          # the workflow still produces a release in that case
          # (just without auto-AUR-publish).
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          # Publish immediately. The wflow-bin AUR package downloads
          # from /releases/download/v<ver>/, which 404s on draft
          # releases — auto-publish so the bin package can install
          # the same minute the tag lands.
          draft: false
          name: "wflow ${{ steps.stage.outputs.version }}"
          body: |
            Prebuilt x86_64 Linux binary tarball for wflow ${{ steps.stage.outputs.version }}.

            Verify with `SHA256SUMS`. Requires Qt 6 runtime libs (`qt6-base`, `qt6-declarative`).

            See `INSTALL.txt` inside the tarball for install commands. See [`REVIEW.md`](https://github.com/cushycush/wflow/blob/main/REVIEW.md) for the trust model when running unfamiliar workflows.

            Release notes still need a writeup — replace this body before publishing.
          files: |
            stage/${{ steps.stage.outputs.name }}.tar.gz
            stage/SHA256SUMS
