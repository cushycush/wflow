[package]
name = "wflow"
version = "0.1.0"
edition = "2021"
description = "A CLI workflow engine (and GUI) for Wayland automation"
license = "MIT OR Apache-2.0"
rust-version = "1.77.2"

[[bin]]
name = "wflow"
path = "src/main.rs"

[dependencies]
cxx = "1"
cxx-qt = "0.8"
cxx-qt-lib = { version = "0.8", features = ["qt_gui", "qt_qml", "qt_quickcontrols"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "process", "io-util"] }
dirs = "5"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
kdl = "6"
clap = { version = "4", features = ["derive"] }

[build-dependencies]
cxx-qt-build = "0.8"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
