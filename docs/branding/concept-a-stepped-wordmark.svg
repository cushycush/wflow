<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept A — wordmark. Stepped-w icon paired with the literal word
  "flow" so the whole thing reads "wflow." The icon and text share a
  baseline; the text sits at the icon's optical center.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64"
     font-family="system-ui, -apple-system, 'Hanken Grotesk', sans-serif">
  <rect width="64" height="64" rx="14" fill="#e29846"/>
  <path d="M 8 14 L 16 26 L 24 14 L 32 38 L 40 14 L 48 50 L 56 14"
        stroke="#1a1208" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="76" y="44" font-size="36" font-weight="700"
        fill="#15181f" letter-spacing="-1.2">flow</text>
</svg>
