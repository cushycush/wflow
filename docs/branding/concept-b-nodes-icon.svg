<?xml version="1.0" encoding="UTF-8"?>
<!--
  Concept B — NODES + WIRES

  The w drawn as four rounded "step cards" connected by thin wires
  that zigzag through descending valleys. Most literal interpretation
  of the workflow concept: each card is an action, the wires are the
  data flowing between them. Reads as a tiny canvas in letter form.

  The valleys still step down (V1 shallowest, V3 deepest) so the flow
  direction reads left-to-right, matching how the editor's canvas
  actually runs.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="128" height="128">
  <rect width="64" height="64" rx="14" fill="#e29846"/>

  <!-- Wires: zigzag through descending valleys, anchored at each card's
       bottom edge. Drawn first so the cards sit on top. -->
  <path d="M 8 18 L 16 30 L 24 18 L 32 42 L 40 18 L 48 50 L 56 18"
        stroke="#1a1208" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"
        opacity="0.6"/>

  <!-- Valley dots: tiny "junction" markers where wires meet. Optional;
       mute them with low opacity so the cards stay the focal point. -->
  <circle cx="16" cy="30" r="1.6" fill="#1a1208"/>
  <circle cx="32" cy="42" r="1.6" fill="#1a1208"/>
  <circle cx="48" cy="50" r="1.6" fill="#1a1208"/>

  <!-- Step cards: 4 rounded squares at each peak, the literal "nodes". -->
  <rect x="4"  y="10" width="8" height="8" rx="2" fill="#1a1208"/>
  <rect x="20" y="10" width="8" height="8" rx="2" fill="#1a1208"/>
  <rect x="36" y="10" width="8" height="8" rx="2" fill="#1a1208"/>
  <rect x="52" y="10" width="8" height="8" rx="2" fill="#1a1208"/>
</svg>
