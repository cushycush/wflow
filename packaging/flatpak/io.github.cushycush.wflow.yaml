# Flatpak manifest for wflow.
#
# Builds against KDE Platform 6.9 (Qt 6.9, freedesktop 25.08 base) —
# cxx-qt 0.8 compatible, and the matching rust-stable extension 25.08
# ships a Rust toolchain new enough for edition2024 (1.86+), which
# transitive deps via ashpd → zbus → zvariant_utils require.
#
# Host-side commands (wdotool, notify-send, wl-copy, and arbitrary
# shell "..." actions) are routed through `flatpak-spawn --host`,
# which the sandbox is allowed to invoke via the
# `org.freedesktop.Flatpak` D-Bus interface granted below.
#
# To test locally (requires flatpak-builder + the runtimes installed):
#   flatpak install --user flathub org.kde.Sdk//6.9 org.kde.Platform//6.9 \
#                                  org.freedesktop.Sdk.Extension.rust-stable//25.08
#   ./packaging/flatpak/build-local.sh
#
# To submit to Flathub: see packaging/flatpak/README.md.

id: io.github.cushycush.wflow

runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

command: wflow

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    # Cargo will look here for vendored crate sources.
    CARGO_HOME: /run/build/wflow/cargo
    # Use the rust-stable SDK extension's toolchain rather than the
    # default rustup-managed one (which the sandbox doesn't have).
    RUSTFLAGS: ""

finish-args:
  # Qt rendering needs DRI device + IPC + Wayland (or XWayland fallback).
  - --share=ipc
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11

  # wflow's config + workflows directory. Without this, the app can't
  # see ~/.config/wflow at all.
  - --filesystem=xdg-config/wflow:create

  # Host-spawn for the user's `shell "..."` action and the
  # `clipboard` action (wl-copy). Input/window actions go through
  # the libei portal in process; notifications go through the
  # Notification portal. The remaining host-spawn surface is
  # exactly what wflow can't replace with a portal: arbitrary user
  # commands, which IS the user-facing feature. Flathub reviewers
  # will ask about this; REVIEW.md at the repo root has the full
  # justification + threat model.
  - --talk-name=org.freedesktop.Flatpak

modules:
  # The Rust app itself. cargo-sources.json is generated by
  # flatpak-cargo-generator.py against this repo's Cargo.lock and
  # mirrors every transitive crate as a Flatpak source spec, so the
  # offline build inside the sandbox doesn't need network.
  - name: wflow
    buildsystem: simple
    build-commands:
      # Stage cargo's vendor dir so --offline works.
      - mkdir -p .cargo
      - cp -v packaging/flatpak/cargo-config.toml .cargo/config.toml
      - cargo --offline fetch --manifest-path Cargo.toml --verbose
      - cargo --offline build --release --locked --verbose

      # Install the binary, completions, and man pages.
      - install -Dm755 target/release/wflow /app/bin/wflow
      - install -d /app/share/bash-completion/completions
      - target/release/wflow completions bash > /app/share/bash-completion/completions/wflow
      - install -d /app/share/zsh/site-functions
      - target/release/wflow completions zsh > /app/share/zsh/site-functions/_wflow
      - install -d /app/share/fish/vendor_completions.d
      - target/release/wflow completions fish > /app/share/fish/vendor_completions.d/wflow.fish
      - install -d /app/share/man/man1
      - target/release/wflow man --output /app/share/man/man1 >/dev/null

      # Desktop integration files.
      - install -Dm644 packaging/flatpak/io.github.cushycush.wflow.desktop /app/share/applications/io.github.cushycush.wflow.desktop
      - install -Dm644 packaging/flatpak/io.github.cushycush.wflow.metainfo.xml /app/share/metainfo/io.github.cushycush.wflow.metainfo.xml
      # Scalable app icon. Path is the canonical Freedesktop hicolor
      # location; AppStream metadata + the .desktop file's
      # `Icon=io.github.cushycush.wflow` resolve here automatically.
      - install -Dm644 packaging/flatpak/io.github.cushycush.wflow.svg /app/share/icons/hicolor/scalable/apps/io.github.cushycush.wflow.svg

      # License files (Flathub requires them in /app/share/licenses).
      - install -Dm644 LICENSE-MIT /app/share/licenses/io.github.cushycush.wflow/LICENSE-MIT
      - install -Dm644 LICENSE-APACHE /app/share/licenses/io.github.cushycush.wflow/LICENSE-APACHE
    sources:
      # NOTE: for Flathub submission, replace the dir source below with
      #   - type: git
      #     url: https://github.com/cushycush/wflow.git
      #     tag: v0.3.0
      # The dir form is for `flatpak-builder` against a local checkout.
      - type: dir
        path: ../..
      # Generated by:
      #   curl -L -o flatpak-cargo-generator.py \
      #     https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
      #   python3 flatpak-cargo-generator.py Cargo.lock -o packaging/flatpak/cargo-sources.json
      - cargo-sources.json
